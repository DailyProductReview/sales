<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💰 Income Accelerator | Find Your Money Zone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0c17 0%, #0f1222 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #edf2ff;
            line-height: 1.4;
            min-height: 100vh;
            padding: 1rem;
        }

        /* MAIN CONTAINER - fully visible without extra scroll, but button always in view */
        .quiz-wrapper {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(12, 18, 34, 0.75);
            backdrop-filter: blur(3px);
            border-radius: 2.5rem;
            padding: 1.5rem 1.8rem 2rem;
            border: 1px solid rgba(255, 200, 100, 0.25);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(115deg, #FFE6B3, #FFC55A, #F5A623);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.4rem;
        }

        .badge {
            display: inline-block;
            background: rgba(245, 176, 66, 0.2);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #FFD966;
            margin-bottom: 1rem;
        }

        .subhead {
            font-size: 1rem;
            color: #b9ceff;
            margin-bottom: 1.5rem;
            border-left: 3px solid #F5B042;
            padding-left: 0.9rem;
        }

        /* progress ring style */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.8rem;
            background: #0e1528;
            padding: 0.5rem 1rem;
            border-radius: 60px;
        }
        .step-text {
            font-size: 0.85rem;
            font-weight: 600;
            background: #1f2a48;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }
        .progress-bar-bg {
            flex: 1;
            height: 8px;
            background: #232a44;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #F5B042, #FFD966);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* CARD STYLE */
        .quiz-card {
            background: rgba(5, 10, 22, 0.7);
            border-radius: 1.8rem;
            padding: 1.6rem 1.5rem;
            margin: 1rem 0 1.2rem 0;
            border: 1px solid rgba(255, 200, 100, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.35;
        }

        /* Options grid */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .quiz-option {
            background: #10172e;
            border-radius: 100px;
            padding: 0.9rem 1.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2a3657;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .quiz-option:hover {
            background: #1e2848;
            border-color: #F5B042;
            transform: translateX(5px);
        }
        .quiz-option.selected {
            background: linear-gradient(95deg, #F5B042, #E6A017);
            color: #0a0f1e;
            border-color: #FFE2A4;
            box-shadow: 0 5px 14px rgba(245,176,66,0.4);
        }
        .opt-icon {
            font-size: 1.4rem;
        }

        /* STICKY BUTTON ZONE - always visible without scroll */
        .sticky-button-area {
            position: sticky;
            bottom: 1rem;
            margin-top: 0.5rem;
            background: rgba(12, 18, 34, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            padding: 0.6rem;
            z-index: 100;
            border: 1px solid rgba(245,176,66,0.5);
        }
        .continue-btn {
            width: 100%;
            background: linear-gradient(95deg, #F5B042, #E69500);
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            font-family: inherit;
            color: #0f111f;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .continue-btn:hover:not(:disabled) {
            background: linear-gradient(95deg, #FFC55A, #F5A623);
            transform: scale(0.98);
        }
        .continue-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* email capture block */
        .email-capture {
            background: linear-gradient(135deg, #0E1628, #0a1022);
            border-radius: 1.8rem;
            padding: 1.6rem;
            margin: 1rem 0 1rem;
            border: 1px solid #FFC85766;
            text-align: center;
        }
        .email-capture h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .email-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        .email-form input {
            background: white;
            border: none;
            padding: 1rem 1.2rem;
            border-radius: 80px;
            font-size: 1rem;
            font-family: inherit;
            color: #111;
            outline: none;
            width: 100%;
        }
        .email-form button {
            background: linear-gradient(95deg, #F5B042, #E69500);
            border: none;
            font-weight: 800;
            font-size: 1.2rem;
            padding: 1rem;
            border-radius: 80px;
            cursor: pointer;
            color: #0a0f1e;
        }
        .fine-print {
            font-size: 0.7rem;
            margin-top: 1rem;
            opacity: 0.7;
        }
        .restart-btn {
            background: #2c3e66;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            opacity: 0.6;
        }
        @media (max-width: 550px) {
            .quiz-wrapper {
                padding: 1.2rem;
            }
            .question-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="quiz-wrapper" id="quizApp">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>💸 MoneyMatch Quiz</h1>
        <span class="badge">🔥 83% get custom roadmap</span>
    </div>
    <div class="subhead">👇 Answer quick — see your hidden income potential + exact next step</div>

    <!-- progress bar with step indicator -->
    <div class="progress-container">
        <span class="step-text" id="stepIndicator">Step 1 / 4</span>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- dynamic content area (questions or email) -->
    <div id="dynamicContent"></div>

    <!-- sticky continue button zone (always visible, no need to scroll) -->
    <div class="sticky-button-area" id="stickyButtonArea">
        <button class="continue-btn" id="mainActionBtn">👉 Continue →</button>
    </div>
</div>
<footer>⚡ No spam · Instant insider kit · 100% free</footer>

<script>
    // ----------------------------------------------
    // NEW VERSION: includes "How much do you want to earn?" question + high curiosity
    // Questions designed for high conversion & scroll-free sticky button
    // ----------------------------------------------
    const questions = [
        {
            text: "🎯 What's your #1 goal with online money?",
            options: [
                { text: "💰 Extra $500–$1,500/month (side cash)", value: "side_cash" },
                { text: "🚀 Full-time freedom: $5k–$10k/month", value: "fulltime" },
                { text: "💎 Scalable empire: $20k+/month", value: "empire" },
                { text: "🧠 Learn & build sustainable assets", value: "assets" }
            ]
        },
        {
            text: "💵 HOW MUCH DO YOU WANT TO EARN in the next 90 days? (Be honest!)",
            options: [
                { text: "💸 $1,000 – $3,000 (fast start)", value: "1k_3k" },
                { text: "🔥 $5,000 – $10,000 (serious leap)", value: "5k_10k" },
                { text: "🏆 $15,000+ (full income replacement)", value: "15k_plus" },
                { text: "🌱 Any amount, but consistent & scalable", value: "consistent" }
            ]
        },
        {
            text: "⏱️ How much time can you invest weekly?",
            options: [
                { text: "⌛ 2–4 hours (busy but focused)", value: "low_time" },
                { text: "📆 5–10 hours (part-time hustle)", value: "mid_time" },
                { text: "⚡ 15+ hours (all-in mode)", value: "full_time" },
                { text: "🛠️ I want semi-passive systems", value: "passive" }
            ]
        },
        {
            text: "🧩 Which skill excites you most? (Curiosity booster)",
            options: [
                { text: "📈 E‑com / Dropshipping", value: "ecom" },
                { text: "🤖 AI tools & automation", value: "ai" },
                { text: "🎥 TikTok/UGC & faceless channels", value: "ugc" },
                { text: "📚 Digital products / coaching", value: "digital" }
            ]
        }
    ];

    let currentIdx = 0;
    let userSelections = []; // store {qIdx, value, text}
    let quizFinished = false;

    const dynamicDiv = document.getElementById('dynamicContent');
    const stepIndicatorSpan = document.getElementById('stepIndicator');
    const progressFillDiv = document.getElementById('progressFill');
    const mainBtn = document.getElementById('mainActionBtn');

    // Helper update progress & step text
    function updateMeta() {
        if (!quizFinished) {
            stepIndicatorSpan.innerText = `Step ${currentIdx+1} / ${questions.length}`;
            let percent = ((currentIdx) / questions.length) * 100;
            if (percent < 0) percent = 0;
            progressFillDiv.style.width = `${percent}%`;
        } else {
            stepIndicatorSpan.innerText = `Completed 🎯`;
            progressFillDiv.style.width = `100%`;
        }
    }

    // Generate personalized curiosity message based on answers (includes income desire)
    function generatePersonalizedHook() {
        const getVal = (idx) => {
            const found = userSelections.find(s => s.qIdx === idx);
            return found ? found.value : "ambitious";
        };
        const goal = getVal(0);
        const incomeTarget = getVal(1);
        const timeCommit = getVal(2);
        const skill = getVal(3);
        
        let incomeMessage = "";
        if (incomeTarget === "1k_3k") incomeMessage = "Fast-track $1k–$3k blueprint";
        else if (incomeTarget === "5k_10k") incomeMessage = "Premium $5k–$10k monthly system";
        else if (incomeTarget === "15k_plus") incomeMessage = "High-ticket $15k+ scaling framework";
        else incomeMessage = "Evergreen consistent cashflow model";
        
        let skillMatch = "";
        if (skill === "ecom") skillMatch = "winning products & automation";
        else if (skill === "ai") skillMatch = "AI content machines + ChatGPT workflows";
        else if (skill === "ugc") skillMatch = "viral faceless accounts & UGC arbitrage";
        else skillMatch = "digital course & coaching launch secrets";
        
        let timeAdvice = "";
        if (timeCommit === "low_time") timeAdvice = "efficient 2-4h/week loophole";
        else if (timeCommit === "mid_time") timeAdvice = "part-time momentum strategy";
        else if (timeCommit === "full_time") timeAdvice = "rapid scale roadmap";
        else timeAdvice = "automated income architecture";
        
        return `🎁 EXCLUSIVE: Based on your "${incomeMessage}" goal + ${skillMatch} + ${timeAdvice} — we built a custom 3‑phase money map. Enter your email and get the full PDF + video case study instantly. Don't miss your personalized blueprint!`;
    }
    
    // Render current question
    function renderCurrentQuestion() {
        if (quizFinished) {
            renderEmailCapture();
            return;
        }
        if (currentIdx >= questions.length) {
            finishQuizAndShowEmail();
            return;
        }
        const q = questions[currentIdx];
        const existing = userSelections.find(s => s.qIdx === currentIdx);
        const selectedVal = existing ? existing.value : null;
        
        let optionsHtml = '';
        q.options.forEach(opt => {
            const isSelected = (selectedVal === opt.value);
            const selectedClass = isSelected ? 'selected' : '';
            optionsHtml += `
                <div class="quiz-option ${selectedClass}" data-value="${opt.value}" data-text="${escapeHtml(opt.text)}">
                    <span class="opt-icon">${opt.text.charAt(0)}</span>
                    <span>${escapeHtml(opt.text)}</span>
                </div>
            `;
        });
        
        const cardHtml = `
            <div class="quiz-card">
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options-grid" id="optionsGrid">
                    ${optionsHtml}
                </div>
            </div>
        `;
        dynamicDiv.innerHTML = cardHtml;
        
        // attach click handlers to options
        const optionDivs = document.querySelectorAll('.quiz-option');
        optionDivs.forEach(opt => {
            opt.addEventListener('click', (e) => {
                const value = opt.getAttribute('data-value');
                const text = opt.getAttribute('data-text');
                // update or add selection
                const idxInArray = userSelections.findIndex(s => s.qIdx === currentIdx);
                const newEntry = { qIdx: currentIdx, value: value, text: text };
                if (idxInArray !== -1) {
                    userSelections[idxInArray] = newEntry;
                } else {
                    userSelections.push(newEntry);
                }
                // re-render same question to highlight selected
                renderCurrentQuestion();
                // enable main button visually (already enabled but update style)
                if (mainBtn) mainBtn.disabled = false;
            });
        });
        
        // update button text based on if it's last question
        updateButtonText();
        updateMeta();
    }
    
    function updateButtonText() {
        if (quizFinished) {
            if (mainBtn) mainBtn.innerHTML = "✨ Submit & Unlock ✨";
            return;
        }
        if (currentIdx === questions.length - 1) {
            mainBtn.innerHTML = "🔓 Reveal my money map →";
        } else {
            mainBtn.innerHTML = "👉 Continue →";
        }
    }
    
    // handle continue / next action (sticky button)
    function onMainAction() {
        if (quizFinished) {
            // if quiz finished, do nothing (form handled separately)
            return;
        }
        // check if current question has an answer
        const hasAnswer = userSelections.some(s => s.qIdx === currentIdx);
        if (!hasAnswer) {
            // flash subtle reminder
            showFloatingMessage("⚠️ Select an option first — your future income depends on it!", "#F5B042");
            return;
        }
        
        if (currentIdx + 1 < questions.length) {
            // move to next question
            currentIdx++;
            renderCurrentQuestion();
            updateMeta();
            // auto-scroll to top of quiz card smoothly
            document.querySelector('.quiz-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else if (currentIdx + 1 === questions.length) {
            // finish quiz
            finishQuizAndShowEmail();
        }
    }
    
    function finishQuizAndShowEmail() {
        // ensure all questions have answers (fallback)
        for (let i = 0; i < questions.length; i++) {
            if (!userSelections.find(s => s.qIdx === i)) {
                const fallbackOpt = questions[i].options[0];
                userSelections.push({ qIdx: i, value: fallbackOpt.value, text: fallbackOpt.text });
            }
        }
        quizFinished = true;
        updateMeta();
        renderEmailCapture();
        updateButtonText();
        if (mainBtn) mainBtn.disabled = false;
    }
    
    // email capture screen with the exact form + source=quizneu & extra curiosity
    function renderEmailCapture() {
        const curiosityText = generatePersonalizedHook();
        const formHtml = `
            <div class="email-capture">
                <h3>📩 Your Income Roadmap Awaits</h3>
                <p style="font-size:1rem; margin: 0.5rem 0;">${escapeHtml(curiosityText)}</p>
                <div style="background: #FFC85720; border-radius: 60px; padding: 0.6rem; margin: 1rem 0;">
                    🔥 BONUS: "Fast Cash 2025" checklist + 3 video trainings (value $97) — FREE
                </div>
                <form method="post" action="https://www.sendsteed.com/subscribe/" id="finalEmailForm" class="email-form">
                    <input name="e123432" required type="email" placeholder="your@email.com" autocomplete="email">
                    <input type="hidden" name="lllid" value="123432">
                    <input type="hidden" name="lluid" value="sandyarta">
                    <input type="hidden" name="redirect" value="">
                    <input type="hidden" name="source" value="quizneu">
                    <button type="submit">🚀 Send My Personalized Blueprint →</button>
                </form>
                <div class="fine-print">No spam, unsubscribe anytime. Instant access.</div>
                <div id="emailFeedback" style="margin-top: 10px; font-size:0.8rem;"></div>
                <button id="restartQuizBtn" class="restart-btn">⟳ Take quiz again (different goal)</button>
            </div>
        `;
        dynamicDiv.innerHTML = formHtml;
        
        // attach restart quiz handler
        const restartBtn = document.getElementById('restartQuizBtn');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                // full reset
                currentIdx = 0;
                userSelections = [];
                quizFinished = false;
                renderCurrentQuestion();
                updateMeta();
                updateButtonText();
                if (mainBtn) mainBtn.disabled = false;
                // scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
        
        // email form validation & source already set to quizneu
        const emailForm = document.getElementById('finalEmailForm');
        if (emailForm) {
            emailForm.addEventListener('submit', (e) => {
                const emailInput = emailForm.querySelector('input[name="e123432"]');
                const email = emailInput?.value.trim();
                if (!email || !email.includes('@') || !email.includes('.')) {
                    e.preventDefault();
                    const feedbackDiv = document.getElementById('emailFeedback');
                    if (feedbackDiv) {
                        feedbackDiv.innerHTML = '⚠️ Please enter a valid email address to unlock your custom money plan.';
                        feedbackDiv.style.color = '#FFB347';
                    }
                    return;
                }
                const submitBtn = emailForm.querySelector('button');
                if (submitBtn) {
                    submitBtn.innerText = '✨ Sending your roadmap...';
                    submitBtn.disabled = true;
                }
                // allow actual POST to sendsteed with source=quizneu
                // no extra preventDefault
            });
        }
    }
    
    function showFloatingMessage(msg, bgColor) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '80px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = '#0a0f1e';
        toast.style.fontWeight = 'bold';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '60px';
        toast.style.zIndex = '2000';
        toast.style.boxShadow = '0 5px 20px black';
        toast.style.fontSize = '0.9rem';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // add event listener to main sticky button
    if (mainBtn) {
        mainBtn.addEventListener('click', onMainAction);
    }
    
    // initial render
    renderCurrentQuestion();
    updateMeta();
    
    // optional: ensure button never gets lost — sticky css already handles it
    // additional: disable button if no answer initially but not needed
    function syncButtonState() {
        if (!quizFinished && !userSelections.find(s => s.qIdx === currentIdx)) {
            // not mandatory, but we keep it enabled so they can click but get message.
            mainBtn.disabled = false;
        } else {
            mainBtn.disabled = false;
        }
    }
    syncButtonState();
</script>
</body>
</html>
